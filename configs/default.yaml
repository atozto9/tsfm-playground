# tsfm-playground default config.
# Defaults avoid remote downloads and use the fake backend.

server:
  host: "0.0.0.0"
  port: 7860

backend:
  name: fake
  model_path: null
  model_id: null
  library_path: null
  adapter_class: null
  device: null
  allow_remote_download: false
  backend_options: {}

forecast:
  horizon: 24
  quantiles: [0.1, 0.5, 0.9]
  max_horizon: 10000

serving:
  session_timeout_s: 1800

ui:
  initial_demo: wave

